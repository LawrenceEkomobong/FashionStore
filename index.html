<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store sign up page</title>

<link rel="stylesheet" href="Sign-Up.css">
</head>
<body>
<main>
  <div class="first-text">
 <h1>Welcome to Fashion Store</h1>
 <h4>Sign up below</h4>
  </div>
  <form id="form">
    <label for="name">Name</label>
    <input type="text" placeholder="Enter your name" id="name">
    <label for="email">Email</label>
    <input type="email" placeholder="enter your email" id="email">
    <label for="password">Password</label>
    <input type="password"placeholder="enter your password" id="password">
    <label for="password-check">Confirm Password</label>
    <input type="password" placeholder="confirm password" id="password-check">
    <div class="first-btn">
    <button type="submit" id="btn">Create account</button>
    </div>
  </form>
  <div class="last-text">
  <p>Already have an account? then login below</p>
  <a href="Login.html" id="second-btn">Login</a>
  </div>
  <div id="alert"></div>
</main>
<script type="module" src="Sign-Up.js"></script>
</body>
</html>
