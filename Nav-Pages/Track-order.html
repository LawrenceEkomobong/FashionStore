<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Your Order | [Your Brand Name]</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<style>
  /* ===========================
   GLOBAL / BRAND TOKENS
   =========================== */
:root {
  --color-bg: #faf9f7;
  --color-bg-alt: #f1efeb;
  --color-text: #1a1a1a;
  --color-text-muted: #5c5c5c;
  --color-accent: #b08d57; /* warm gold — swap for your brand color */
  --color-border: #e2dfd8;
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', Helvetica, Arial, sans-serif;
  --max-width: 1100px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-body);
  color: var(--color-text);
  background-color: var(--color-bg);
  line-height: 1.6;
}

/* ===========================
   HEADER + HAMBURGER MENU
   =========================== */
.site-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 6%;
  border-bottom: 1px solid var(--color-border);
  position: relative;
}



@media (max-width: 768px) {
  .contact-details {
    grid-template-columns: 1fr;
  }

  .contact-hero h1 {
    font-size: 2.2rem;
  }
}

/* ===========================
   TRACK ORDER PAGE
   =========================== */
.track-page {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 6%;
  min-height: 80vh;
}

.track-hero {
  text-align: center;
  padding: 100px 0 50px;
}

.track-hero h1 {
  font-family: var(--font-heading);
  font-size: 2.6rem;
  margin-bottom: 16px;
  letter-spacing: 1px;
}

.track-hero p {
  font-size: 1.05rem;
  color: var(--color-text-muted);
}

.track-form-section {
  padding-bottom: 100px;
}

.track-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background-color: var(--color-bg-alt);
  border: 1px solid var(--color-border);
  padding: 40px;
}

.track-form label {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--color-text-muted);
  margin-top: 16px;
}

.track-form label:first-child {
  margin-top: 0;
}

.track-form input {
  padding: 14px 16px;
  border: 1px solid var(--color-border);
  background-color: var(--color-bg);
  font-family: var(--font-body);
  font-size: 1rem;
  color: var(--color-text);
}

.track-form input:focus {
  outline: none;
  border-color: var(--color-accent);
}

.track-form button {
  margin-top: 28px;
  border: none;
  cursor: pointer;
}

.track-result {
  margin-top: 28px;
  padding: 20px;
  border: 1px solid var(--color-border);
  background-color: var(--color-bg);
  color: var(--color-text-muted);
  font-size: 0.95rem;
  display: none;
}

.track-result.show {
  display: block;
}

@media (max-width: 768px) {
  .track-hero h1 {
    font-size: 2rem;
  }

  .track-form {
    padding: 28px;
  }
}

/* ===========================
   FOOTER
   =========================== */
.site-footer {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--color-border);
  color: var(--color-text-muted);
  font-size: 0.85rem;
}

/* ===========================
   RESPONSIVE
   =========================== */
@media (max-width: 768px) {
  .about-grid {
    grid-template-columns: 1fr;
  }

  .about-hero h1 {
    font-size: 2.2rem;
  }
}

</style>
<body>

  <main class="track-page">

    <section class="track-hero">
      <h1>Track Your Order</h1>
      <p>Enter your order number and email to check the status of your delivery.</p>
    </section>

    <section class="track-form-section">
      <form class="track-form" id="trackForm">
        <label for="orderNumber">Order Number</label>
        <input type="text" id="orderNumber" name="orderNumber" placeholder="e.g. ORD-23491" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />

        <button type="submit" class="cta-button">Track Order</button>
      </form>

      <div class="track-result" id="trackResult"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Your Brand Name. All rights reserved.</p>
  </footer>

</body>
</html>
