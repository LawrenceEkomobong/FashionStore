<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | [Your Brand Name]</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<style>
  /* ===========================
   GLOBAL / BRAND TOKENS
   =========================== */
:root {
  --color-bg: #faf9f7;
  --color-bg-alt: #f1efeb;
  --color-text: #1a1a1a;
  --color-text-muted: #5c5c5c;
  --color-accent: #b08d57; /* warm gold — swap for your brand color */
  --color-border: #e2dfd8;
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', Helvetica, Arial, sans-serif;
  --max-width: 1100px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-body);
  color: var(--color-text);
  background-color: var(--color-bg);
  line-height: 1.6;
}


.site-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 6%;
  border-bottom: 1px solid var(--color-border);
  position: relative;
}



/* ===========================
   CONTACT PAGE
   =========================== */
.contact-page {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 6%;
}

.contact-hero {
  text-align: center;
  padding: 10px 0 60px;
}

.contact-hero h1 {
  font-family: var(--font-heading);
  font-size: 3rem;
  margin-bottom: 16px;
  letter-spacing: 1px;
}

.contact-hero p {
  font-size: 1.1rem;
  color: var(--color-text-muted);
  max-width: 500px;
  margin: 0 auto;
}

.contact-details {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  place-content: center;
}

.contact-card {
  background-color: var(--color-bg-alt);
  border: 1px solid var(--color-border);
  text-align: center;
  padding: 40px 10px;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.contact-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
}

.contact-card h3 {
  font-family: var(--font-heading);
  font-size: 1.1rem;
  margin-bottom: 12px;
  color: var(--color-accent);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.contact-card p {
  color: var(--color-text-muted);
  font-size: 1rem;
}

.contact-card a {
  color: var(--color-text);
  text-decoration: none;
}

.contact-card a:hover {
  color: var(--color-accent);
}

@media (max-width: 768px) {
  .contact-details {
    grid-template-columns: 1fr;
  }

  .contact-hero h1 {
    font-size: 2.2rem;
  }
}

/* ===========================
   FOOTER
   =========================== */
.site-footer {
  text-align: center;
  padding: 30px 0;
  border-top: 1px solid var(--color-border);
  color: var(--color-text-muted);
  font-size: 0.85rem;
}

/* ===========================
   RESPONSIVE
   =========================== */
@media (max-width: 768px) {
  .about-grid {
    grid-template-columns: 1fr;
  }

  .about-hero h1 {
    font-size: 2.2rem;
  }
}

</style>
<body>

  <!-- Hamburger menu nav (placeholder — match your existing structure) -->
  <header class="site-header">
    <div class="logo">Fashion Stores</div>
    
  </header>

  <main class="contact-page">

    <section class="contact-hero">
      <h1>Get in Touch</h1>
      <p>We're here to help. Reach out anytime and our team will get back to you.</p>
    </section>

    <section class="contact-details">
      <div class="contact-card">
        <h3>Email</h3>
        <p><a href="mailto:support@yourbrand.com">support@FashionStores@gmail.com</a></p>
      </div>
      <div class="contact-card">
        <h3>Phone</h3>
        <p><a href="tel:+10000000000">+234 (804) 546-5050</a></p>
      </div>
      <div class="contact-card">
        <h3>Address</h3>
        <p>123 Heritage Lane<br />Lagos, Nigeria</p>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Fashion Stores. All rights reserved.</p>
  </footer>
</body>
</html>
